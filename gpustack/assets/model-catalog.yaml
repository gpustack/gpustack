- name: GLM-5.1
  description: GLM-5.1 is the next iteration of Zhipu AI's GLM series, featuring an even larger MoE with the glm_moe_dsa architecture, advanced agentic, reasoning, and coding capabilities.
  home: https://z.ai
  icon: /static/catalog_icons/zai.png
  size: 754
  categories:
    - llm
  capabilities:
    - context/198K
    - reasoning
    - tools
  licenses:
    - mit
  release_date: "2026-04-04"
  specs:
    # Ascend NPUs (vllm-ascend, BF16)
    - mode: throughput
      quantization: BF16
      gpu_filters:
        vendor: ascend
      source: huggingface
      huggingface_repo_id: zai-org/GLM-5.1
      backend: vLLM
      env:
        HCCL_OP_EXPANSION_MODE: AIV
        OMP_NUM_THREADS: "1"
        PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
        VLLM_ASCEND_BALANCE_SCHEDULING: "1"
      backend_parameters:
        - --max-model-len=8192
        - --gpu-memory-utilization=0.95
        - --trust-remote-code
    # NVIDIA Hopper+ (vLLM, FP8 + MTP speculative)
    - mode: throughput
      quantization: FP8
      gpu_filters:
        vendor: nvidia
        compute_capability: ">=9.0" # Hopper or later
      source: huggingface
      huggingface_repo_id: zai-org/GLM-5.1-FP8
      backend: vLLM
      backend_parameters:
        - --speculative-config.method=mtp
        - --speculative-config.num_speculative_tokens=3
        - --tool-call-parser=glm47
        - --reasoning-parser=glm45
        - --enable-auto-tool-choice
        - --chat-template-content-format=string
    # Standard fallback (BF16, vLLM)
    - mode: standard
      quantization: BF16
      source: huggingface
      huggingface_repo_id: zai-org/GLM-5.1
      backend: vLLM
      backend_parameters:
        - --reasoning-parser=glm45
        - --tool-call-parser=glm47
        - --enable-auto-tool-choice
        - --max-model-len=65536
