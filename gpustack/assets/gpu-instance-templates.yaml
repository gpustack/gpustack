  ## Jupyter Lab
  - name: "jupyter-lab-4.5-cuda-12.8"
    displayName: "Jupyter Lab 4.5 + CUDA 12.8"
    manufacturer: "nvidia"
    spec:
      image: "quay.io/jupyter/pytorch-notebook:cuda12-lab-4.5.7"
      imagePullPolicy: "IfNotPresent"
      command:
        - "jupyter"
        - "lab"
        - "--ServerApp.token=''"
        - "--ServerApp.password=''"
        - "--notebook-dir=/workspace"
        - "--allow-root"
      ports:
        - name: "JUPYTER"
          port: 8888
          protocol: "TCP"
      resources:
        cpu: "2"
        memory: "4Gi"
        localStorage: "15Gi"
      volumeMount: "/workspace"
