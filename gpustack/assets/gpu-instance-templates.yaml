# Builtin GPU instance templates for use.

items:

  #
  # CPU instance templates
  #

  ## Ubuntu
  - name: "ubuntu-24.04"
    displayName: "Ubuntu 24.04 LTS"
    manufacturer: "cpu"
    spec:
      image: "ubuntu:24.04"
      imagePullPolicy: "IfNotPresent"
      command:
        - "tail"
        - "-f"
        - "/dev/null"
      ports:
        - name: "SSH"
          port: 22
          protocol: "TCP"
      resources:
        cpu: "1"
        memory: "2Gi"
        localStorage: "15Gi"
      volumeMount: "/workspace"
  - name: "ubuntu-22.04"
    displayName: "Ubuntu 22.04 LTS"
    manufacturer: "cpu"
    spec:
      image: "ubuntu:22.04"
      imagePullPolicy: "IfNotPresent"
      command:
        - "tail"
        - "-f"
        - "/dev/null"
      ports:
        - name: "SSH"
          port: 22
          protocol: "TCP"
      resources:
        cpu: "1"
        memory: "2Gi"
        localStorage: "15Gi"
      volumeMount: "/workspace"

