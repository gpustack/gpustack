{{- if eq .Values.gateway.ingressClassname "higress" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-higress-plugins
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "chart_labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-higress-plugins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
{{- end }}
