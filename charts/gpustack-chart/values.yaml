# Default values for gpustack.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
debug: false
# registrationToken is used to authenticate workers with the server.
# If null, a random 32-character token is generated on first install and reused on upgrades.
registrationToken: null
# Global values are propagated to all sub-charts (Helm convention).
# `global.hub` is the container registry host (e.g. docker.io).
# For air-gapped or private registry installs, override:
#   --set global.hub=myregistry.example.com
global:
  hub: docker.io
# Image pull secrets for the gpustack server, worker, and higress-plugins images.
# The chart always creates a docker-registry Secret named "gpustack-image-pull-secret".
# Two ways to populate it, which may be combined:
#   1. Reference existing Secrets in the release namespace by name:
#        imagePullSecrets:
#          existingSecrets:
#            - my-existing-secret
#   2. Provide registry credentials; the auto-created Secret will contain the auth:
#        imagePullSecrets:
#          credentials:
#            registry: docker.io
#            username: myuser
#            password: mypassword
#            email: ""      # optional
#
# When no credentials are provided, the auto-created Secret contains an empty
# {"auths":{}} and is harmless. The Secret is also pre-wired into the bundled
# higress-core sub-chart (see higress-core.gateway.imagePullSecrets and
# higress-core.controller.imagePullSecrets below).
imagePullSecrets:
  existingSecrets: []
  credentials:
    registry: docker.io
    username: null
    password: null
    email: null
image:
  # Image repository including namespace (no registry). The final reference is
  # rendered as `{global.hub}/{image.repository}:{image.tag}`.
  repository: gpustack/gpustack
  tag: null
  pullPolicy: IfNotPresent
server:
  ingress:
    # example: gpustack.example.com
    hostname: null
    tls:
      # if tls.cert and tls.key are set, the schema will be https
      cert: null
      # cert: |-
      #   -----BEGIN CERTIFICATE-----
      #   MIID...
      #   -----END CERTIFICATE-----
      key: null
      # key: |-
      #   -----BEGIN PRIVATE KEY-----
      #   MIIE...
      #   -----END PRIVATE KEY-----

  # if you have an existing database, set externalDatabaseURL to its connection string
  # e.g. postgresql://user:password@hostname:port/dbname
  externalDatabaseURL: null
  dataVolume:
    hostPath: null
    size: 10Gi
  apiPort: 30080
  metricsPort: 10161
  environmentConfig: {}
clusterDomain: cluster.local
gateway:
  # IngressClass name for the Higress gateway; GPUStack checks if it exists in the cluster to enable in-cluster gateway mode
  ingressClassname: higress

# higress-core sub-chart configuration.
# Set enabled: true to deploy Higress gateway alongside GPUStack.
# If you already have Higress installed in the cluster, leave this disabled
# and ensure gateway.ingressClassname matches your existing Higress instance.
# Full list of available values: https://higress.io/helm-charts
higress-core:
  enabled: true
  global:
    # Must match gateway.ingressClassname above
    ingressClass: higress
    # GPUStack manages its own plugin server; disable the built-in one
    enablePluginServer: false
    # `hub` is inherited from the top-level `global.hub` via Helm's
    # global-values propagation. Override here only when higress images
    # live in a different registry than the rest of GPUStack.
  downstream:
    idleTimeout: 1800
  upstream:
    idleTimeout: 3
  gateway:
    hub: null
    image: gpustack/mirrored-higress-gateway
    imagePullSecrets:
      - name: gpustack-image-pull-secret

  service:
    # Preserve real client IP at the gateway (required for IP-based
    # rate limiting, audit logging, and X-Forwarded-For correctness).
    # Note: when Service type is LoadBalancer/NodePort, ensure the
    # external LB performs health checks against healthCheckNodePort,
    # otherwise nodes without a gateway pod will drop traffic.
    externalTrafficPolicy: Local
  controller:
    hub: null
    image: gpustack/mirrored-higress-higress
    imagePullSecrets:
      - name: gpustack-image-pull-secret
  pilot:
    hub: null
    image: gpustack/mirrored-higress-pilot
higressPlugins:
  image:
    # Image repository including namespace (no registry); final reference is `{global.hub}/{repository}:{tag}`.
    repository: gpustack/higress-plugins
    pullPolicy: IfNotPresent
    tag: "0.2.2-post1"
worker:
  enabled: true
  # GPU vendor for the worker nodes. Controls driver volume mounts and runtimeClassName.
  # Supported values:
  #   null      - no vendor-specific driver mounts or runtimeClassName (e.g. CPU-only nodes)
  #   nvidia    - NVIDIA GPU; sets runtimeClassName to "nvidia"
  #   mthreads  - Moore Threads GPU; sets runtimeClassName to "mthreads"
  #   amd       - AMD GPU (ROCm); mounts /opt/rocm
  #   ascend    - Huawei Ascend NPU; mounts /usr/local/Ascend/driver and /usr/local/Ascend/ascend-toolkit
  #   hygon     - Hygon DCU; mounts /opt/hyhal and /opt/dtk
  #   metax     - MetaX GPU; mounts /opt/mxdriver and /opt/maca
  #   iluvatar  - Iluvatar GPU; mounts /usr/local/corex
  #   cambricon - Cambricon MLU; mounts /usr/bin/cnmon and /usr/local/neuware
  #   thead     - T-Head PPU; mounts /usr/local/PPU_SDK
  gpuVendor: nvidia
  port: 10150
  metricsPort: 10151
  environmentConfig: {}
  # Host path for worker data directory.
  dataDir: /var/lib/gpustack
  extraVolumeMounts: []
  # - name: custom-lib
  #   mountPath: /opt/custom/lib
  #   readOnly: true
  extraVolumes: []
  # - name: custom-lib
  #   hostPath:
  #     path: /opt/custom/lib
  #     type: DirectoryOrCreate
