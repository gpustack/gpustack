# Default values for gpustack.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
debug: false
# registrationToken is used to authenticate workers with the server.
# If null, a random 32-character token is generated on first install and reused on upgrades.
registrationToken: null
# Global values are propagated to all sub-charts (Helm convention).
# `global.hub` is the container registry host (e.g. docker.io).
# For air-gapped or private registry installs, override:
#   --set global.hub=myregistry.example.com
#
# `global.imagePullSecrets` is the list of Secret references attached to every
# pod created by this chart and propagated to sub-charts (higress-core,
# gpustack-enterprise) that follow the same convention. Defaults to a single
# entry pointing at the canonical `gpustack-image-pull-secret` that this chart
# auto-creates (see `imagePullSecret` below).
#
# To reference your own pre-existing Secrets, replace the list entirely:
#   global:
#     imagePullSecrets:
#       - name: my-existing-secret
#       - name: another-secret
# When the list no longer references `gpustack-image-pull-secret` and no
# credentials are provided below, the chart skips creating the canonical
# Secret to avoid leaving an unused resource behind.
global:
  hub: docker.io
  imagePullSecrets:
    - name: gpustack-image-pull-secret
  # Default nodeSelector applied to every GPUStack component (server + worker)
  # when no component-level nodeSelector is provided. Component-level
  # `server.nodeSelector` / `worker.nodeSelector`, when non-empty, REPLACE
  # this value entirely (no merging). For per-vendor worker scheduling, see
  # `worker.gpuVendorOverrides` below.
  nodeSelector: {}

# Auto-creation of the canonical `gpustack-image-pull-secret` docker-registry
# Secret. The Secret is created when either:
#   - `credentials.username` and `credentials.password` are set (populated
#     `.dockerconfigjson`), or
#   - `global.imagePullSecrets` above still references the canonical name
#     (created with an empty `{"auths":{}}` — harmless to reference, useful as
#     a placeholder when no credentials are needed).
# If the user fully swaps `global.imagePullSecrets` to externally managed
# Secrets AND provides no credentials here, the canonical Secret is not
# created.
imagePullSecret:
  credentials:
    registry: docker.io
    username: null
    password: null
    email: null
image:
  # Image repository including namespace (no registry). The final reference is
  # rendered as `{global.hub}/{image.repository}:{image.tag}`.
  repository: gpustack/gpustack
  tag: null
  pullPolicy: IfNotPresent
server:
  ingress:
    # example: gpustack.example.com
    hostname: null
    tls:
      # if tls.cert and tls.key are set, the schema will be https
      cert: null
      # cert: |-
      #   -----BEGIN CERTIFICATE-----
      #   MIID...
      #   -----END CERTIFICATE-----
      key: null
      # key: |-
      #   -----BEGIN PRIVATE KEY-----
      #   MIIE...
      #   -----END PRIVATE KEY-----

  # if you have an existing database, set externalDatabaseURL to its connection string
  # e.g. postgresql://user:password@hostname:port/dbname
  externalDatabaseURL: null
  dataVolume:
    hostPath: null
    size: 100Gi
  apiPort: 30080
  metricsPort: 10161
  environmentConfig: {}
  # Node selector for the server pod. When non-empty, REPLACES
  # `global.nodeSelector` entirely (no merging). Leave empty/null to fall
  # back to `global.nodeSelector`.
  nodeSelector: {}
clusterDomain: cluster.local
gateway:
  # IngressClass name for the Higress gateway; GPUStack checks if it exists in the cluster to enable in-cluster gateway mode
  ingressClassname: higress

# higress-core sub-chart configuration.
# Set enabled: true to deploy Higress gateway alongside GPUStack.
# If you already have Higress installed in the cluster, leave this disabled
# and ensure gateway.ingressClassname matches your existing Higress instance.
# Full list of available values: https://higress.io/helm-charts
higress-core:
  enabled: true
  global:
    # Must match gateway.ingressClassname above
    ingressClass: higress
    # GPUStack manages its own plugin server; disable the built-in one
    enablePluginServer: false
    # `hub` is inherited from the top-level `global.hub` via Helm's
    # global-values propagation. Override here only when higress images
    # live in a different registry than the rest of GPUStack.
  downstream:
    idleTimeout: 1800
  upstream:
    idleTimeout: 3
  gateway:
    hub: null
    image: gpustack/mirrored-higress-gateway
    imagePullSecrets:
      - name: gpustack-image-pull-secret

  service:
    # Preserve real client IP at the gateway (required for IP-based
    # rate limiting, audit logging, and X-Forwarded-For correctness).
    # Note: when Service type is LoadBalancer/NodePort, ensure the
    # external LB performs health checks against healthCheckNodePort,
    # otherwise nodes without a gateway pod will drop traffic.
    externalTrafficPolicy: Local
  controller:
    hub: null
    image: gpustack/mirrored-higress-higress
    imagePullSecrets:
      - name: gpustack-image-pull-secret
  pilot:
    hub: null
    image: gpustack/mirrored-higress-pilot
higressPlugins:
  image:
    # Image repository including namespace (no registry); final reference is `{global.hub}/{repository}:{tag}`.
    repository: gpustack/higress-plugins
    pullPolicy: IfNotPresent
    tag: "0.2.2-post1"
worker:
  enabled: false
  # GPU vendors for the worker nodes. Accepts a list to allow a single
  # cluster to schedule workers for multiple runtimes side-by-side.
  # Controls per-DaemonSet driver volume mounts and runtimeClassName.
  # Supported values (per entry):
  #   nvidia    - NVIDIA GPU; sets runtimeClassName to "nvidia"
  #   mthreads  - Moore Threads GPU; sets runtimeClassName to "mthreads"
  #   amd       - AMD GPU (ROCm); mounts /opt/rocm
  #   ascend    - Huawei Ascend NPU; mounts /usr/local/Ascend/driver and /usr/local/Ascend/ascend-toolkit
  #   hygon     - Hygon DCU; mounts /opt/hyhal and /opt/dtk
  #   metax     - MetaX GPU; mounts /opt/mxdriver and /opt/maca
  #   iluvatar  - Iluvatar GPU; mounts /usr/local/corex
  #   cambricon - Cambricon MLU; mounts /usr/bin/cnmon and /usr/local/neuware
  #   thead     - T-Head PPU; mounts /usr/local/PPU_SDK
  #
  # Rendering modes:
  #   - 0 or 1 entry: single DaemonSet `<release>-worker`, no vendor labels,
  #     no anti-affinity (byte-compatible with the v1 chart layout).
  #   - 2+ entries: per-vendor DaemonSet `<release>-worker-<vendor>` plus a
  #     CPU fallback DaemonSet `<release>-worker`. The CPU DS gets a
  #     `DoesNotExist` nodeAffinity for every label key declared in
  #     `gpuVendorOverrides[*].nodeSelector` so it never competes for the
  #     same nodes. All worker pods get a required podAntiAffinity
  #     (topologyKey=hostname, namespaceSelector={}) so two GPUStack worker
  #     pods cannot share a node even across namespaces — protects the
  #     `hostNetwork: true` ports from collision.
  #
  # Set to [] for a CPU-only worker.
  gpuVendors:
    - nvidia
  # Base nodeSelector for ALL worker DaemonSets. When non-empty, REPLACES
  # `global.nodeSelector` entirely (no merging with global). Leave empty
  # to fall back to `global.nodeSelector`. Per-vendor DaemonSets merge
  # their override on top of this base (override keys win).
  nodeSelector: {}
  # Per-vendor scheduling overrides. The vendor DaemonSet's effective
  # nodeSelector is `worker.nodeSelector` (or `global.nodeSelector` when
  # the worker value is empty) merged with the vendor's nodeSelector below
  # — vendor keys win on conflict.
  #
  # REQUIRED in multi-vendor mode (`gpuVendors` length >= 2). The chart
  # rejects the install when any of the following holds, mirroring the
  # invariants enforced by the cluster route layer:
  #   - a configured vendor has no `nodeSelector` block (the CPU DS and
  #     that vendor DS would compete for the same nodes);
  #   - two vendors share an IDENTICAL nodeSelector (their DaemonSets
  #     would target the same node set and podAntiAffinity would leave
  #     one Pending forever — typical copy-paste mistake);
  #   - any base nodeSelector key also appears in a vendor override (the
  #     CPU DS would simultaneously require and forbid that key and
  #     never schedule).
  gpuVendorOverrides: {}
  # Example:
  # gpuVendorOverrides:
  #   nvidia:
  #     nodeSelector:
  #       nvidia.com/gpu.present: "true"
  #   amd:
  #     nodeSelector:
  #       amd.com/gpu.present: "true"
  port: 10150
  metricsPort: 10151
  environmentConfig: {}
  # Host path for worker data directory.
  dataDir: /var/lib/gpustack
  extraVolumeMounts: []
  # - name: custom-lib
  #   mountPath: /opt/custom/lib
  #   readOnly: true
  extraVolumes: []
  # - name: custom-lib
  #   hostPath:
  #     path: /opt/custom/lib
  #     type: DirectoryOrCreate
