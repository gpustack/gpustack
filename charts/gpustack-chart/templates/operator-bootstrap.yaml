{{- if .Values.worker.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-operator-worker-deployment
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "chart_labels" . | indent 4 }}
data:
  # ── ytt layer ──────────────────────────────────────────────────────────
  # The ConfigMap data (values.yaml, template.yaml, apply.sh) is rendered by
  # Helm as plain text.  At runtime the bootstrap Job runs apply.sh which
  # uses ytt to process values.yaml + template.yaml and pipes the result to
  # kubectl apply.  Helm only manages the ConfigMap/Job/SA/RBAC; the
  # Deployment, Service and optional cert-manager resources are managed by
  # ytt + kubectl inside the cluster.
  # ────────────────────────────────────────────────────────────────────────
  values.yaml: |

    #@data/values
    ---
    certmanagerEnabled: false
    namespaceName: "{{ .Release.Namespace }}"

  template.yaml: |

    #@ load("@ytt:data", "data")

    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Release.Name }}-operator
      namespace: #@ data.values.namespaceName
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "443"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "https"
      labels:
        app.kubernetes.io/part-of: gpustack-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/name: {{ .Release.Name }}-operator
    spec:
      selector:
        app.kubernetes.io/part-of: gpustack-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/name: {{ .Release.Name }}-operator
      sessionAffinity: ClientIP
      ports:
        - name: https
          port: 443
          targetPort: https
    #@ if data.values.certmanagerEnabled:
    ---
    apiVersion: cert-manager.io/v1
    kind: Issuer
    metadata:
      name: {{ .Release.Name }}-operator-selfsigned-issuer
      namespace: #@ data.values.namespaceName
      labels:
        app.kubernetes.io/part-of: gpustack-operator
    spec:
      selfSigned: {}
    ---
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: {{ .Release.Name }}-operator-cert
      namespace: #@ data.values.namespaceName
      labels:
        app.kubernetes.io/part-of: gpustack-operator
    spec:
      secretName: {{ .Release.Name }}-operator-cert
      issuerRef:
        name: {{ .Release.Name }}-operator-selfsigned-issuer
        kind: Issuer
      commonName: {{ .Release.Name }}-operator
      dnsNames:
        - "{{ .Release.Name }}-operator.{{ .Release.Namespace }}.svc.cluster.local"
        - "{{ .Release.Name }}-operator.{{ .Release.Namespace }}.svc"
        - "{{ .Release.Name }}-operator.{{ .Release.Namespace }}"
        - "{{ .Release.Name }}-operator"
    #@ end
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-operator
      namespace: #@ data.values.namespaceName
      labels:
        app.kubernetes.io/part-of: gpustack-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/name: {{ .Release.Name }}-operator
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/part-of: gpustack-operator
          app.kubernetes.io/component: operator
          app.kubernetes.io/name: {{ .Release.Name }}-operator
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: gpustack-operator
            app.kubernetes.io/component: operator
            app.kubernetes.io/name: {{ .Release.Name }}-operator
        spec:
          serviceAccountName: {{ .Release.Name }}-operator
          restartPolicy: Always
          {{- with (include "image_pull_secrets" . | trim) }}
          {{- nindent 10 . }}
          {{- end }}
          {{- with (include "gpustack.operatorNodeSelector" . | trim) }}
          nodeSelector:
            {{- nindent 12 . }}
          {{- end }}
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    topologyKey: kubernetes.io/hostname
                    labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/part-of
                          operator: In
                          values:
                            - gpustack-operator
                        - key: app.kubernetes.io/component
                          operator: In
                          values:
                            - operator
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - {{ .Release.Name }}-operator
          containers:
            - name: main
              image: {{ include "gpustack.operatorImage" . }}
              imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
              args:
                - gpustack
                - worker
                - -v=2
                # ytt if/end: only wraps the immediately following node
                #@ if/end data.values.certmanagerEnabled:
                - --cert-dir=/var/run/gpustack/certs
              resources:
                {{- toYaml .Values.operator.resources | nindent 16 }}
              env:
                - name: KUBERNETES_POD_IP
                  valueFrom:
                    fieldRef:
                      fieldPath: status.podIP
                - name: KUBERNETES_POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: KUBERNETES_POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: KUBERNETES_NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
                - name: KUBERNETES_SERVICE_NAME
                  value: {{ .Release.Name }}-operator
                - name: GPUSTACK_CONTAINER_REGISTRY
                  value: {{ include "gpustack.hub" . }}
                {{- $repo := .Values.image.repository }}
                {{- $parts := splitList "/" $repo }}
                {{- if gt (len $parts) 1 }}
                {{- $ns := $parts | initial | join "/" }}
                {{- if ne $ns "gpustack" }}
                - name: GPUSTACK_CONTAINER_NAMESPACE
                  value: {{ $ns }}
                {{- end }}
                {{- end }}
                {{- with .Values.global.imagePullSecrets }}
                - name: GPUSTACK_IMAGE_PULL_SECRETS
                  value: {{ range $i, $s := . }}{{ if $i }},{{ end }}{{ $s.name }}{{ end }}
                {{- end }}
                {{- with .Values.operator.environmentConfig }}
                {{- range $key, $value := . }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
                {{- end }}
              ports:
                - name: https
                  containerPort: 31443
              startupProbe:
                failureThreshold: 10
                periodSeconds: 5
                httpGet:
                  scheme: HTTPS
                  port: https
                  path: /readyz
              readinessProbe:
                failureThreshold: 3
                timeoutSeconds: 5
                periodSeconds: 5
                httpGet:
                  scheme: HTTPS
                  port: https
                  path: /readyz
              livenessProbe:
                failureThreshold: 10
                timeoutSeconds: 5
                periodSeconds: 10
                httpGet:
                  scheme: HTTPS
                  port: https
                  path: /livez
              volumeMounts:
                - name: gpustack-data-dir
                  mountPath: /var/lib/gpustack
                # ytt if/end: only wraps the immediately following node
                #@ if/end data.values.certmanagerEnabled:
                - name: gpustack-cert-dir
                  mountPath: /var/run/gpustack/certs
          volumes:
            - name: gpustack-data-dir
              hostPath:
                path: {{ .Values.worker.dataDir | quote }}
                type: DirectoryOrCreate
            # ytt if/end: only wraps the immediately following node
            #@ if/end data.values.certmanagerEnabled:
            - name: gpustack-cert-dir
              secret:
                secretName: {{ .Release.Name }}-operator-cert

  apply.sh: |

    #!/bin/sh
    set -e

    CERTMANAGER_ENABLED="false"
    if kubectl get crd certificates.cert-manager.io >/dev/null 2>&1; then
      CERTMANAGER_ENABLED="true"
    fi
    echo "Detected cert-manager: ${CERTMANAGER_ENABLED}"

    TMP_DIR=$(mktemp -d)
    cp -f *.yaml ${TMP_DIR}/
    cd ${TMP_DIR}/
    ytt --file . --data-value-yaml certmanagerEnabled=${CERTMANAGER_ENABLED} | kubectl apply -f -
    echo "Applied rendered manifests"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-operator-worker-deployment
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "chart_labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-operator
      {{- with (include "image_pull_secrets" . | trim) }}
      {{- nindent 6 . }}
      {{- end }}
      {{- with (include "gpustack.operatorNodeSelector" . | trim) }}
      nodeSelector:
        {{- nindent 8 . }}
      {{- end }}
      containers:
      - name: main
        image: {{ include "gpustack.operatorImage" . }}
        command:
          - "/bin/sh"
          - "apply.sh"
        workingDir: /app
        volumeMounts:
          - name: app-dir
            mountPath: /app
      restartPolicy: Never
      volumes:
        - name: app-dir
          configMap:
            name: {{ .Release.Name }}-operator-worker-deployment
            defaultMode: 0755
  backoffLimit: 5
  # Cleanup the job after 1 day.
  ttlSecondsAfterFinished: 86400
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-operator-worker-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "chart_labels" . | indent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-operator
      {{- with (include "image_pull_secrets" . | trim) }}
      {{- nindent 6 . }}
      {{- end }}
      containers:
      - name: main
        image: {{ include "gpustack.operatorImage" . }}
        command:
          - "/bin/sh"
          - "-c"
          - |
            set -e
            TMP_DIR=$(mktemp -d)
            cp -f *.yaml ${TMP_DIR}/
            cd ${TMP_DIR}/
            ytt --file . --data-value-yaml certmanagerEnabled=false | kubectl delete -f - --ignore-not-found=true
            echo "Cleaned up operator manifests"
        workingDir: /app
        volumeMounts:
          - name: app-dir
            mountPath: /app
      restartPolicy: Never
      volumes:
        - name: app-dir
          configMap:
            name: {{ .Release.Name }}-operator-worker-deployment
            defaultMode: 0755
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
{{- end }}
