# This workflow packs the Docker images for the GPUStack runtime.

name: Pack

permissions:
  actions: read
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

on:
  workflow_dispatch: {}
  push:
    branches:
      - "main"
      - "v*-dev"
    tags:
      - "v*.*.*"
    paths-ignore:
      - "mkdocs.yml"
      - "docs/**"
      - "**.md"
      - "**.mdx"
      - "**.png"
      - "**.jpg"
      - "**.gif"
  pull_request:
    branches:
      - "main"
      - "v*-dev"
    paths:
      - ".github/workflows/pack.yaml"
      - "pack/**"

env:
  INPUT_PYTHON_VERSION: 3.11
  INPUT_USERNAME: gpustack
  INPUT_PASSWORD: ${{ secrets.CI_DOCKERHUB_PASSWORD }}
  INPUT_NAMESPACE: gpustack
  INPUT_REPOSITORY: gpustack

jobs:
  metadata:
    runs-on: ubuntu-22.04
    outputs:
      tags: ${{ steps.metadata.outputs.tags }}
      labels: ${{ steps.metadata.outputs.labels }}
      json: ${{ steps.metadata.outputs.json }}
      filter_labels: ${{ steps.filter-labels.outputs.value }}
      cache_from_amd64: ${{ steps.cache.outputs.cache_from_amd64 }}
      cache_to_amd64: ${{ steps.cache.outputs.cache_to_amd64 }}
      cache_from_arm64: ${{ steps.cache.outputs.cache_from_arm64 }}
      cache_to_arm64: ${{ steps.cache.outputs.cache_to_arm64 }}
    steps:
      - name: Get Metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.INPUT_NAMESPACE }}/${{ env.INPUT_REPOSITORY }}"
          tags: |
            type=ref,event=pr
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=dev-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch,enable=${{ contains(github.ref, 'refs/heads/v') && endsWith(github.ref, '-dev') }}
            type=sha,prefix={{branch}}-,enable=${{ contains(github.ref, 'refs/heads/v') && endsWith(github.ref, '-dev') }}
            type=pep440,pattern={{raw}}
            type=pep440,pattern=v{{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'rc') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'rc') }}
          flavor: |
            latest=false
      - name: Get Image Filter Labels
        id: filter-labels
        run: |
          #!/usr/bin/env bash

          set -eo pipefail

          LABELS=(
            "org.opencontainers.image.source=${{ fromJSON(steps.metadata.outputs.json).labels['org.opencontainers.image.source'] }}"
            "org.opencontainers.image.version=${{ fromJSON(steps.metadata.outputs.json).labels['org.opencontainers.image.version'] }}"
            "org.opencontainers.image.revision=${{ fromJSON(steps.metadata.outputs.json).labels['org.opencontainers.image.revision'] }}"
            "org.opencontainers.image.created=${{ fromJSON(steps.metadata.outputs.json).labels['org.opencontainers.image.created'] }}"
          )
          VAL=$(printf "%s;" "${LABELS[@]}")
          echo "value=${VAL}" >> $GITHUB_OUTPUT
      - name: Get Cache Refs
        id: cache
        run: |
          #
          # Per-arch cache refs. Each platform job writes/reads its own ref to
          # avoid concurrent writes overwriting each other, and so that the
          # buildkit cache mount (now single-platform per job) is captured
          # correctly by registry caching.
          #
          # CACHE_FROM_REF / CACHE_TO_REF format:
          #   - Release tag vX.Y.Z          -> gpustack/build-cache:gpustack-${VERSION}-${ARCH}
          #   - PR/Push to branch / default -> gpustack/build-cache:gpustack-${BRANCH}-${ARCH}
          #   - Fallback when missing       -> gpustack/build-cache:gpustack-main-${ARCH}
          #
          DEFAULT_BRANCH="main"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF="${GITHUB_REF#refs/tags/}"
            IFS="." read -r VERSION_MAJOR VERSION_MINOR VERSION_PATCH <<< "${REF}"
            VERSION="${VERSION_MAJOR}.${VERSION_MINOR}"
            BASE_REF="gpustack/build-cache:gpustack-${VERSION}"
          else
            REF="${GITHUB_BASE_REF:-${GITHUB_REF}}"
            BRANCH="${REF#refs/heads/}"
            BRANCH="${BRANCH%-dev}"
            BASE_REF="gpustack/build-cache:gpustack-${BRANCH}"
          fi
          for ARCH in amd64 arm64; do
            CACHE_FROM_REF="${BASE_REF}-${ARCH}"
            CACHE_TO_REF="${CACHE_FROM_REF}"
            if ! docker manifest inspect "${CACHE_FROM_REF}" >/dev/null 2>&1; then
              CACHE_FROM_REF="gpustack/build-cache:gpustack-${DEFAULT_BRANCH}-${ARCH}"
            fi
            echo "cache_from_${ARCH}=${CACHE_FROM_REF}" >> $GITHUB_OUTPUT
            echo "cache_to_${ARCH}=${CACHE_TO_REF}" >> $GITHUB_OUTPUT
            echo "DEBUG: ARCH=${ARCH} CACHE_FROM=${CACHE_FROM_REF} CACHE_TO=${CACHE_TO_REF}"
          done

  build:
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-22.04
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Maximize Docker Build Space
        uses: gpustack/.github/.github/actions/maximize-docker-build-space@main
        with:
          deep-clean: true
          root-reserve-mb: 20480
      - name: Setup BuildX Cache
        id: setup-buildx-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache
          key: cache-mount-${{ matrix.arch }}-${{ hashFiles('uv.lock') }}
      - name: Restore BuildX Cache
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-dir: ${{ github.workspace }}/.cache
          dockerfile: ${{ github.workspace }}/pack/Dockerfile
          skip-extraction: ${{ steps.setup-buildx-cache.outputs.cache-hit }}
      - name: Setup BuildX
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            env.BUILDKIT_STEP_LOG_MAX_SIZE=-1
            env.BUILDKIT_STEP_LOG_MAX_SPEED=-1
      - name: Login DockerHub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.INPUT_USERNAME }}
          password: ${{ env.INPUT_PASSWORD }}
      - name: Build
        id: build
        uses: docker/build-push-action@v6
        with:
          allow: |
            network.host
            security.insecure
          ulimit: |
            nofile=65536:65536
          shm-size: 16G
          provenance: true
          sbom: true
          file: ${{ github.workspace }}/pack/Dockerfile
          context: ${{ github.workspace }}
          platforms: ${{ matrix.platform }}
          build-args: |
            PYTHON_VERSION=${{ env.INPUT_PYTHON_VERSION }}
            GPUSTACK_RUNTIME_DOCKER_MIRRORED_NAME_FILTER_LABELS=${{ needs.metadata.outputs.filter_labels }}
          labels: |
            ${{ needs.metadata.outputs.labels }}
          outputs: |
            ${{ github.event_name != 'pull_request' && format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.INPUT_NAMESPACE, env.INPUT_REPOSITORY) || '' }}
          cache-from: |
            type=registry,ref=${{ matrix.arch == 'amd64' && needs.metadata.outputs.cache_from_amd64 || needs.metadata.outputs.cache_from_arm64 }}
          cache-to: |
            ${{ github.event_name != 'pull_request' && format('type=registry,mode=max,compression=gzip,ref={0},ignore-error=true', matrix.arch == 'amd64' && needs.metadata.outputs.cache_to_amd64 || needs.metadata.outputs.cache_to_arm64) || '' }}
      - name: Export Digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload Digest
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - metadata
      - build
    runs-on: ubuntu-22.04
    steps:
      - name: Download Digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - name: Setup BuildX
        uses: docker/setup-buildx-action@v3
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.INPUT_USERNAME }}
          password: ${{ env.INPUT_PASSWORD }}
      - name: Create Manifest
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ needs.metadata.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"${DOCKER_METADATA_OUTPUT_JSON}") \
            $(printf '${{ env.INPUT_NAMESPACE }}/${{ env.INPUT_REPOSITORY }}@sha256:%s ' *)
      - name: Inspect
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ needs.metadata.outputs.json }}
        run: |
          TAG=$(jq -r '.tags[0]' <<<"${DOCKER_METADATA_OUTPUT_JSON}")
          docker buildx imagetools inspect "${TAG}"

  chart:
    # Publish the Helm chart to Docker Hub at
    # docker.io/<INPUT_NAMESPACE>/<chart-name>, i.e. docker.io/gpustack/gpustack-chart.
    # The chart's internal name in Chart.yaml is `gpustack-chart`, so `helm push`
    # naturally lands the artifact under that path — Helm couples three
    # identities (dep name == internal chart name == OCI path last segment),
    # so we keep them aligned end-to-end.
    #
    # Release-tag runs additionally attach the chart tgz to the GitHub release
    # alongside the wheel, so customers without OCI access can still grab it.
    # Skipped on PRs (lint-only) so we never push a chart that points at an
    # image which wasn't merged.
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - merge
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Compute chart version metadata
        id: chart_meta
        run: |
          #
          # Version mapping (kept in lockstep with image tags in metadata job):
          #
          #   refs/tags/vX.Y.Z       -> chart=X.Y.Z         appVersion=X.Y.Z         image.tag=vX.Y.Z
          #   refs/heads/main        -> chart=0.0.0-dev.<sha>     appVersion=dev          image.tag=dev-<sha>
          #   refs/heads/vN.M-dev    -> chart=N.M.0-dev.<sha>     appVersion=vN.M-dev     image.tag=vN.M-dev-<sha>
          #   workflow_dispatch      -> chart=0.0.0-manual.<sha>  appVersion=dev          image.tag=dev-<sha>
          #
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          REF="${GITHUB_REF}"

          if [[ "${REF}" == refs/tags/v*.*.* ]]; then
            VERSION="${REF#refs/tags/v}"
            APP_VERSION="${VERSION}"
            IMAGE_TAG="v${VERSION}"
          elif [[ "${REF}" == refs/heads/main ]]; then
            VERSION="0.0.0-dev.${SHORT_SHA}"
            APP_VERSION="dev"
            IMAGE_TAG="dev-${SHORT_SHA}"
          elif [[ "${REF}" =~ ^refs/heads/v([0-9]+)\.([0-9]+)-dev$ ]]; then
            MAJ="${BASH_REMATCH[1]}"
            MIN="${BASH_REMATCH[2]}"
            VERSION="${MAJ}.${MIN}.0-dev.${SHORT_SHA}"
            APP_VERSION="v${MAJ}.${MIN}-dev"
            IMAGE_TAG="v${MAJ}.${MIN}-dev-${SHORT_SHA}"
          else
            # workflow_dispatch from an unexpected ref — publish as a dev build
            # tied to the sha so the artifact is still uniquely addressable.
            VERSION="0.0.0-manual.${SHORT_SHA}"
            APP_VERSION="dev"
            IMAGE_TAG="dev-${SHORT_SHA}"
          fi

          echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"       >> "$GITHUB_OUTPUT"

      - name: Patch Chart.yaml & values.yaml
        env:
          VERSION:     ${{ steps.chart_meta.outputs.version }}
          APP_VERSION: ${{ steps.chart_meta.outputs.app_version }}
          IMAGE_TAG:   ${{ steps.chart_meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          yq -i '.version    = strenv(VERSION)'     charts/gpustack-chart/Chart.yaml
          yq -i '.appVersion = strenv(APP_VERSION)' charts/gpustack-chart/Chart.yaml
          yq -i '.image.tag  = strenv(IMAGE_TAG)'   charts/gpustack-chart/values.yaml
          echo "--- Chart.yaml ---"
          cat charts/gpustack-chart/Chart.yaml
          echo "--- values.yaml image stanza ---"
          yq '.image' charts/gpustack-chart/values.yaml

      - name: Helm lint
        run: helm lint charts/gpustack-chart

      - name: Helm dependency update
        run: helm dependency update charts/gpustack-chart

      - name: Helm package
        run: |
          mkdir -p dist
          helm package charts/gpustack-chart -d dist/

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.INPUT_USERNAME }}
          password: ${{ env.INPUT_PASSWORD }}

      - name: Push chart to DockerHub
        env:
          OCI_REPO: oci://registry-1.docker.io/${{ env.INPUT_NAMESPACE }}
        run: |
          set -euo pipefail
          for f in dist/*.tgz; do
            echo "Pushing $f -> ${OCI_REPO}"
            helm push "$f" "${OCI_REPO}"
          done

      - name: Attach chart to GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          # Keep alignment with the wheel release step in ci.yml: official
          # releases land as drafts for review; rc tags publish as prerelease.
          draft: ${{ !contains(github.ref, 'rc') }}
          prerelease: ${{ contains(github.ref, 'rc') }}
          fail_on_unmatched_files: true
          files: dist/*.tgz
