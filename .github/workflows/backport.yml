name: Backport
on:
  pull_request_target:
    types: [closed]
permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    name: Backport pull request
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged
    steps:
      - uses: actions/checkout@v4
      - name: Create backport pull requests
        uses: korthout/backport-action@v4
        with:
          label_pattern: "^backport/(.+)$"
